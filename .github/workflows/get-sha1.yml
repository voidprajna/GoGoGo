name: Get SHA1 Fingerprint

on:
  workflow_dispatch:

jobs:
  get-sha1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Get SHA1 Fingerprint
        run: |
          echo "========================================"
          echo "获取密钥库 SHA1 指纹"
          echo "========================================"
          keytool -list -v -keystore keystore/GoGoGo.jks -alias GoGoKey -storepass GoGoGo | grep -A 1 "Certificate fingerprints"
          echo ""
          echo "========================================"
          echo "完整证书信息"
          echo "========================================"
          keytool -list -v -keystore keystore/GoGoGo.jks -alias GoGoKey -storepass GoGoGo

      - name: Extract and Display SHA1
        run: |
          echo ""
          echo "========================================"
          echo "SHA1 指纹（用于百度地图配置）"
          echo "========================================"
          SHA1=$(keytool -list -v -keystore keystore/GoGoGo.jks -alias GoGoKey -storepass GoGoGo | grep "SHA1:" | awk '{print $2}')
          echo "SHA1: $SHA1"
          echo ""
          echo "请复制上面的 SHA1 值到百度地图开放平台"

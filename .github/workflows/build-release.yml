name: Build Release

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  Build:
    name: Release APK
    runs-on: ubuntu-latest
    steps:
      # https://github.com/marketplace/actions/checkout
      - uses: actions/checkout@v5

      # 设置 JDK
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle

      # 创建 local.properties 文件
      - name: Create local.properties
        run: |
          cat << EOF > local.properties
          MAPS_API_KEY=${{ secrets.MAPS_API_KEY || 'dummy_key' }}
          MAPS_SAFE_CODE=${{ secrets.MAPS_SAFE_CODE || 'dummy_code' }}
          EOF

      - name: Build APK
        run: bash ./gradlew assembleRelease

      - name: Get Build Tool Version
        shell: bash
        run: |
          BUILD_TOOL_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | tail -n 1)
          echo "BUILD_TOOL_VERSION=$BUILD_TOOL_VERSION" >> $GITHUB_ENV
          echo Last build tool version is: $BUILD_TOOL_VERSION

      # https://github.com/marketplace/actions/sign-android-release
      - name: Sign APK
        id: sign_apk
        uses: r0adkll/sign-android-release@v1.0.4
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY || '' }}
          alias: ${{ secrets.ALIAS || 'GoGoKey' }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD || 'GoGoGo' }}
          keyPassword: ${{ secrets.KEY_PASSWORD || 'GoGoGo' }}
        env:
          BUILD_TOOLS_VERSION: ${{ env.BUILD_TOOL_VERSION }}

      - name: Get Signed APK Name
        run: |
          FULL_PATH=${{steps.sign_apk.outputs.signedReleaseFile}}
          FILENAME=$(basename "$FULL_PATH")
          echo "FILENAME=${FILENAME}" >> $GITHUB_ENV
          echo "APK_PATH=${FULL_PATH}" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILENAME }}
          path: ${{steps.sign_apk.outputs.signedReleaseFile}}

      # 删除已存在的 release
      - name: Delete existing release
        run: |
          gh release delete voidprajna --yes || true
          git push --delete origin voidprajna || true
        env:
          GH_TOKEN: ${{ github.token }}

      # 创建新的 tag
      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f voidprajna
          git push -f origin voidprajna

      # https://github.com/marketplace/actions/gh-release
      - name: Release APK
        uses: softprops/action-gh-release@v2.3.2
        with:
          token: ${{ github.token }}
          tag_name: voidprajna
          name: "Latest Release"
          body: "Auto-generated release from commit ${{ github.sha }}"
          prerelease: false
          files: ${{steps.sign_apk.outputs.signedReleaseFile}}
